backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "site_data"
    label: "Site Content"
    files:

      # ================================
      # LITERATURE POSTS
      # ================================
      - name: "posts"
        label: "Literature Posts"
        file: "data/posts.json"

        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"

            fields:
              - label: "Title"
                name: "title"
                widget: "string"

              - label: "Slug"
                name: "slug"
                widget: "string"
                hint: "Example: fiduciary-leadership"

              - label: "Date"
                name: "date"
                widget: "datetime"

              - label: "Category"
                name: "category"
                widget: "string"
                required: false

              - label: "Featured Image"
                name: "image"
                widget: "image"
                required: false

              - label: "Preview Text"
                name: "preview"
                widget: "text"

              - label: "Full Post Content"
                name: "content"
                widget: "markdown"

      # ================================
      # RECENT ENGAGEMENTS
      # ================================
      - name: "engagements"
        label: "Recent Engagements"
        file: "data/engagements.json"

        fields:
          - label: "Engagement Groups"
            name: "engagements"
            widget: "list"
            summary: "{{fields.quarter}}"

            fields:
              - label: "Quarter / Group"
                name: "quarter"
                widget: "string"
                hint: "Example: 2026 Q2"

              - label: "Entries"
                name: "items"
                widget: "list"
                summary: "{{fields.title}}"

                fields:
                  - label: "Title"
                    name: "title"
                    widget: "string"

                  - label: "Role"
                    name: "role"
                    widget: "string"
                    hint: "Example: Industry Speaker"

                  - label: "Event Type / Header"
                    name: "category"
                    widget: "string"
                    required: false
                    hint: "Example: Datathon, Alumni Event, Conference, Speaking Engagement"

                  - label: "Date"
                    name: "date"
                    widget: "string"
                    required: false
                    hint: "Example: May 22nd–May 23rd"

                  - label: "Location"
                    name: "location"
                    widget: "string"
                    required: false
                    hint: "Example: Long Beach, CA"