backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "site_data"
    label: "Site Content"
    files:
      - name: "posts"
        label: "Literature Posts"
        file: "data/posts.json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"

              - label: "Slug"
                name: "slug"
                widget: "string"
                hint: "Example: fiduciary-leadership"

              - label: "Date"
                name: "date"
                widget: "datetime"

              - label: "Category"
                name: "category"
                widget: "string"
                required: false

              - label: "Featured Image"
                name: "image"
                widget: "image"
                required: false

              - label: "Preview Text"
                name: "preview"
                widget: "text"

              - label: "Full Post Content"
                name: "content"
                widget: "markdown"

      - name: "engagements"
        label: "Recent Engagements"
        file: "data/engagements.json"
        fields:
          - label: "Engagement Groups"
            name: "engagements"
            widget: "list"
            summary: "{{fields.quarter}}"
            fields:
              - label: "Quarter / Group"
                name: "quarter"
                widget: "string"
                hint: "Example: 2026 Q2"

              - label: "Entries"
                name: "items"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - label: "Event Name"
                    name: "title"
                    widget: "string"

                  - label: "Role / Participation"
                    name: "role"
                    widget: "string"
                    hint: "Example: Industry Speaker, Judge and Mentor, Volunteer & Attendee"

                  - label: "Host / Organization"
                    name: "organization"
                    widget: "string"
                    required: false
                    hint: "Example: California State University, Long Beach"

                  - label: "Category"
                    name: "category"
                    widget: "select"
                    required: false
                    options:
                      - "Datathon"
                      - "Conference"
                      - "Panel"
                      - "Workshop"
                      - "Alumni Event"
                      - "Showcase"
                      - "Networking Event"
                      - "Volunteer Work"
                      - "Speaking Engagement"
                      - "Community Involvement"
                      - "Other"

                  - label: "Date"
                    name: "date"
                    widget: "string"
                    required: false
                    hint: "Example: May 22nd–May 23rd"

                  - label: "Location"
                    name: "location"
                    widget: "string"
                    required: false
                    hint: "Example: Long Beach, CA"

                  - label: "Description"
                    name: "description"
                    widget: "text"
                    required: false